<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 240 240" role="img" aria-label="Piedmont Environmental emblem">
  <defs>
    <path id="l1-top" d="M 42 120 A 78 78 0 0 1 198 120"/>
    <path id="l1-bot" d="M 50 120 A 70 70 0 0 0 190 120"/>
  </defs>
  <circle cx="120" cy="120" r="112" fill="none" stroke="#2f4a3c" stroke-width="3"/>
  <circle cx="120" cy="120" r="103" fill="none" stroke="#88a17f" stroke-width="1.2"/>
  <g fill="#2f4a3c" font-family="Georgia, 'Times New Roman', serif">
    <text font-size="14.5" font-weight="600" letter-spacing="2.5">
      <textPath xlink:href="#l1-top" href="#l1-top" startOffset="50%" text-anchor="middle">PIEDMONT&#160;ENVIRONMENTAL</textPath>
    </text>
    <text font-size="13" letter-spacing="5">
      <textPath xlink:href="#l1-bot" href="#l1-bot" startOffset="50%" text-anchor="middle">LANDSCAPE&#160;DESIGN</textPath>
    </text>
  </g>
  <!-- tree -->
  <g>
    <!-- filled canopy -->
    <g fill="#4a6b54">
      <circle cx="120" cy="74" r="15"/>
      <circle cx="102" cy="82" r="13"/>
      <circle cx="138" cy="82" r="13"/>
      <circle cx="110" cy="68" r="11"/>
      <circle cx="130" cy="68" r="11"/>
      <circle cx="92"  cy="92" r="10"/>
      <circle cx="148" cy="92" r="10"/>
      <circle cx="120" cy="88" r="13"/>
    </g>
    <!-- canopy highlight -->
    <g fill="#88a17f" opacity="0.55">
      <circle cx="114" cy="72" r="6"/>
      <circle cx="128" cy="78" r="5"/>
      <circle cx="104" cy="84" r="4.5"/>
    </g>
    <!-- trunk + branches + roots -->
    <g stroke="#2f4a3c" stroke-width="2.6" stroke-linecap="round" fill="none">
      <path d="M120 152 C 119 132 121 116 120 92"/>
      <path d="M120 110 C 112 104 106 100 100 96"/>
      <path d="M120 114 C 128 108 134 104 140 100"/>
      <path d="M120 152 C 109 156 97 158 85 164"/>
      <path d="M120 152 C 131 156 143 158 155 164"/>
      <path d="M120 152 C 116 158 112 162 108 168"/>
      <path d="M120 152 C 124 158 128 162 132 168"/>
    </g>
  </g>
</svg>
